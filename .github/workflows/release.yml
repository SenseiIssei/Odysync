name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-cli:
    name: build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: sensei.exe
            archive: sensei-windows-x86_64.zip
          - os: ubuntu-latest
            artifact: sensei
            archive: sensei-linux-x86_64.tar.gz
          - os: macos-latest
            artifact: sensei
            archive: sensei-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p sensei-cli

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: 7z a ${{ matrix.archive }} target/release/${{ matrix.artifact }}

      - name: Archive (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf ${{ matrix.archive }} -C target/release ${{ matrix.artifact }}

      - name: Generate SHA-256
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            certutil -hashfile ${{ matrix.archive }} SHA256 | sed -n 2p > ${{ matrix.archive }}.sha256
          else
            shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  build-gui-windows:
    name: build GUI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: apps/gui
        run: npm install

      - name: Build Tauri app
        working-directory: apps/gui
        run: npx tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: sensei-gui-windows
          path: |
            apps/gui/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  publish:
    needs: [build-cli, build-gui-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: sensei-windows-x86_64.zip
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: sensei-linux-x86_64.tar.gz
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: sensei-macos-x86_64.tar.gz
          path: artifacts

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "artifacts/*"