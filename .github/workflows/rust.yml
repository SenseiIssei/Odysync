name: Rust CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Fail the build on any warning; the codebase is currently warning-free.
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Report every platform's result, not just the first failure.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: sensei-${{ matrix.os }}
          path: |
            target/release/sensei
            target/release/sensei.exe
          if-no-files-found: error

  # The legacy Python tool still ships from main until v2.0.0 is released.
  legacy-python:
    name: legacy python (smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Import check
        working-directory: legacy
        run: python -c "import sys; sys.path.insert(0, 'src'); import sensei_updater"
