[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []
# Only hold our own direct dependencies to the "still maintained" bar.
# Transitively we pull the gtk-rs GTK3 bindings through Tauri's Linux webview,
# and those are formally unmaintained with no alternative available to us —
# seventeen advisories we cannot act on. Vulnerabilities are still denied for
# the whole graph; this narrows *unmaintained* only, rather than pinning a
# list of IDs that grows every release and eventually gets ignored wholesale.
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    # Leading whitespace here previously made this entry unmatchable, so the
    # licence check failed on MPL-2.0 dependencies (`option-ext`, reached via
    # `directories`) despite the licence being listed as allowed.
    "MPL-2.0",
    # webpki-roots: the Mozilla CA bundle, reached through reqwest/rustls.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our own crates depend on each other by path with no version requirement,
# which cargo-deny counts as a wildcard. That is intra-workspace linkage, not
# an unpinned third-party dependency, so it is exempt — external wildcards are
# still denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
