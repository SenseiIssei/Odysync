name: Rust CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # `apps/gui/src-tauri` is a workspace member, so `--workspace` builds the
      # Tauri app on every platform — and on Linux that needs GTK/WebKit
      # development headers. Without them the job died in `glib-sys`, so the
      # Linux leg of this matrix had never actually run.
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace --lib

      - name: Build release (CLI only)
        run: cargo build --release -p odysync-cli

      # This job exists to verify the code, not to distribute it — release.yml
      # is what actually publishes binaries, and its uploads stay fatal.
      # GitHub's artifact service times out often enough that letting it fail
      # a green build across the whole matrix is noise, not signal.
      # `if-no-files-found: error` is kept so a genuinely missing binary still
      # shows up in the step, just without failing the job.
      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: odysync-${{ matrix.os }}
          path: |
            target/release/odysync
            target/release/odysync.exe
          if-no-files-found: error

  # The GUI is half the product but was never built outside a tagged release,
  # so a frontend or Tauri-layer break only surfaced at release time.
  gui:
    name: gui (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/gui/package-lock.json

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: apps/gui
        run: npm ci

      - name: Typecheck
        working-directory: apps/gui
        run: npx tsc -b

      - name: Lint
        working-directory: apps/gui
        run: npx oxlint

      - name: Build frontend
        working-directory: apps/gui
        run: npm run build

      - name: Build Tauri app
        working-directory: apps/gui
        run: npx tauri build

      # `tauri.conf.json` sets `bundle.targets` to `["nsis"]`, so a Linux build
      # produces the binary but no package. Uploading the executable there
      # still proves the GUI compiles and links on Linux, which is the point of
      # this job; asking for an installer that the config never asks Tauri to
      # build would fail forever.
      - name: Upload installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: odysync-gui-${{ matrix.os }}
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: odysync-gui-${{ matrix.os }}
          path: target/release/odysync-gui
          if-no-files-found: error

  audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses and advisories
        run: cargo deny check

  sbom:
    name: generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      # `--output-pattern` was removed from cargo-cyclonedx; the current CLI
      # writes one file per package next to its manifest by default.
      - name: Generate SBOM
        run: cargo cyclonedx --format json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.json"
          if-no-files-found: error
